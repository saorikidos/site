<!DOCTYPE html>
<html lang="pt-BR" data-page="home">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saori Kido | Home</title>
  <meta name="description" content="Landing page cinematográfica de Saori Kido com vídeo de fundo e navegação flutuante.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-shell">
    <div class="home-floating-bar">
      <div class="container home-floating-wrap">
        <a class="brand brand-home" href="index.html">
          <img class="brand-logo" src="imgs/saori kido logo branca.png" alt="Logo Saori Kido">
          <span class="brand-text">Saori Kido</span>
        </a>

        <button class="menu-toggle menu-toggle-home" type="button" aria-expanded="false" aria-controls="site-nav">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav site-nav-home" id="site-nav">
          <a href="index.html" data-nav="home">Home</a>
          <a href="about.html" data-nav="about">Sobre</a>
          <a href="news.html" data-nav="news">News</a>
          <a href="store.html" data-nav="store">Store</a>
          <a href="discography.html" data-nav="discography">Discography</a>
        </nav>
      </div>
    </div>

    <main>
      <section class="hero hero-cinematic">
        <video class="hero-video-bg" autoplay muted loop playsinline>
          <source src="imgs/fundo.mp4" type="video/mp4">
        </video>
        <div class="hero-video-overlay"></div>
        <div class="hero-video-glow"></div>

        <div class="container hero-cinematic-grid">
          <div class="hero-cinematic-main reveal">
            <p class="hero-cinematic-tag">Saori Kido Official Website</p>
            <h1>Saori Kido em seu retorno triunfal.</h1>

            <div class="home-socials" aria-label="Redes sociais">
              <a class="home-social-link" href="https://www.instagram.com/saorikidobrasil/" target="_blank" rel="noreferrer" aria-label="Instagram">
                <img src="imgs/sns_instagram.png" alt="">
              </a>
              <a class="home-social-link" href="https://x.com/SaoriKidoBrasil" target="_blank" rel="noreferrer" aria-label="X">
                <img src="imgs/sns_twitter.png" alt="">
              </a>
              <a class="home-social-link" href="https://www.youtube.com/@SaoriKido" target="_blank" rel="noreferrer" aria-label="YouTube">
                <img src="imgs/sns_youtube.png" alt="">
              </a>
              <a class="home-social-link" href="https://soundcloud.com/saorkido" target="_blank" rel="noreferrer" aria-label="SoundCloud">
                <img src="imgs/sns_soundcloud.png" alt="">
              </a>
            </div>
          </div>

          <aside class="hero-cinematic-side reveal">
            <div class="hero-cinematic-block">
              <p class="hero-cinematic-label">Era em destaque</p>
              <h2>Superfart disponivel agora</h2>
            </div>

            <div class="hero-cinematic-divider"></div>

            <div class="hero-cinematic-block">
              <p class="hero-cinematic-label">Ultimas notícias</p>
              <p class="hero-cinematic-note">Saori tem comeback confirmado para 2026 e a nova fase já começou a ganhar forma.</p>
            </div>

            <div class="hero-actions hero-cinematic-actions">
              <a class="button button-primary" href="discography.html">Ouvir eras</a>
              <a class="button button-secondary" href="about.html">Sobre</a>
            </div>
          </aside>
        </div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
