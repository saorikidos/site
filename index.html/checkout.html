<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saori Kido | Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="imgs/saori kido logo.png" alt="Logo Saori Kido">
          <span class="brand-text">Saori Kido</span>
        </a>
        <nav class="site-nav">
          <a href="index.html">Home</a>
          <a href="news.html">News</a>
          <a href="store.html" class="is-active">Store</a>
          <a href="discography.html">Discography</a>
        </nav>
      </div>
    </header>
    <main>
      <section class="page-hero">
        <div class="container page-hero-inner reveal">
          <p class="breadcrumb">Home / Store / Checkout</p>
          <h1>Complete your order</h1>
        </div>
      </section>
      <section class="section">
        <div class="container checkout-layout">
          <div class="checkout-form panel reveal">
            <div class="checkout-steps">
              <span class="is-active">Enter your info</span>
              <span>Delivery options</span>
              <span>Payment</span>
            </div>
            <div class="form-grid">
              <input type="email" placeholder="Email *">
              <input type="text" placeholder="First name *">
              <input type="text" placeholder="Last name *">
              <input type="text" placeholder="País">
              <input type="text" placeholder="Cidade">
              <input type="text" placeholder="Address *">
              <input type="text" placeholder="City *">
            </div>
            <label class="check-row">
              <input type="checkbox" checked>
              <span>My shipping and billing address is the same</span>
            </label>
            <a class="button buy-button" href="#">Save and continue</a>
          </div>
          <aside class="checkout-summary panel reveal">
            <div id="checkout-items"></div>
            <div class="checkout-total">
              <p>Subtotal <strong id="checkout-subtotal">R$0,00</strong></p>
              <p>Total <strong id="checkout-total">R$0,00</strong></p>
            </div>
          </aside>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </div>
</body>
</html>
