<!DOCTYPE html>
<html lang="en" data-page="checkout">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saori Kido | Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="imgs/saori kido logo.png" alt="Logo Saori Kido">
          <span class="brand-text">Saori Kido</span>
        </a>
        <nav class="site-nav">
          <a href="index.html" data-nav="home">Home</a>
          <a href="news.html" data-nav="news">News</a>
          <a href="store.html" data-nav="store" class="is-active">Store</a>
          <a href="discography.html" data-nav="discography">Discography</a>
        </nav>
      </div>
    </header>
    <main>
      <section class="page-hero">
        <div class="container page-hero-inner reveal">
          <p class="breadcrumb">Home / Store / Checkout</p>
          <h1>Complete sua compra</h1>
        </div>
      </section>
      <section class="section">
        <div class="container checkout-layout">
          <div class="checkout-form panel reveal">
            <div class="checkout-steps">
              <button class="checkout-step is-active" type="button" data-checkout-step="info">Insira suas informações</button>
              <button class="checkout-step" type="button" data-checkout-step="delivery">Opções de entrega</button>
              <button class="checkout-step" type="button" data-checkout-step="payment">Pagamento</button>
            </div>

            <div class="checkout-panel is-active" data-checkout-panel="info">
              <div class="form-grid">
                <input type="email" placeholder="Email *">
                <input type="text" placeholder="Nome *">
                <input type="text" placeholder="Sobrenome *">
                <input type="text" placeholder="País">
                <input type="text" placeholder="Estado">
                <input type="text" placeholder="Endereço *">
                <input type="text" placeholder="Cidade *">
              </div>
              <label class="check-row">
                <input type="checkbox" checked>
                <span>Meu endereço de envio e cobrança é o mesmo</span>
              </label>
              <div class="hero-actions">
                <button class="button buy-button" type="button" data-checkout-next="delivery">Save and continue</button>
              </div>
            </div>

            <div class="checkout-panel" data-checkout-panel="delivery">
              <div class="checkout-option-list">
                <label class="checkout-option">
                  <input type="radio" name="delivery" checked>
                  <div>
                    <strong>Entrega padrão</strong>
                    <p>3 a 5 dias úteis. Frete grátis incluído.</p>
                  </div>
                </label>
                <label class="checkout-option">
                  <input type="radio" name="delivery">
                  <div>
                    <strong>Entrega expressa</strong>
                    <p>1 a 2 dias úteis. Taxa estimada: R$24,90.</p>
                  </div>
                </label>
              </div>
              <div class="hero-actions">
                <button class="button button-secondary" type="button" data-checkout-prev="info">Back</button>
                <button class="button buy-button" type="button" data-checkout-next="payment">Continue to payment</button>
              </div>
            </div>

            <div class="checkout-panel" data-checkout-panel="payment">
              <div class="checkout-option-list">
                <label class="checkout-option">
                  <input type="radio" name="payment" checked>
                  <div>
                    <strong>Cartão de crédito</strong>
                    <p>Visa, Mastercard, Elo and American Express.</p>
                  </div>
                </label>
                <label class="checkout-option">
                  <input type="radio" name="payment">
                  <div>
                    <strong>Pix</strong>
                    <p>Confirmação imediata após o pagamento.</p>
                  </div>
                </label>
                <label class="checkout-option">
                  <input type="radio" name="payment">
                  <div>
                    <strong>Boleto bancário</strong>
                    <p>Confirmação pode levar até 3 dias úteis.</p>
                  </div>
                </label>
              </div>
              <div class="hero-actions">
                <button class="button button-secondary" type="button" data-checkout-prev="delivery">Back</button>
                <a class="button buy-button" href="cart.html">Place order</a>
              </div>
            </div>
          </div>

          <aside class="checkout-summary panel reveal">
            <div id="checkout-items"></div>
            <div class="checkout-total">
              <p>Subtotal <strong id="checkout-subtotal">R$0,00</strong></p>
              <p>Total <strong id="checkout-total">R$0,00</strong></p>
            </div>
          </aside>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </div>
</body>
</html>
